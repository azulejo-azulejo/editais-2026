<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editais Abertos 2026 · Azulejo Produtora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Corbel:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:        #090d5e;
    --navy-light:  #141975;
    --cream:       #f8f3f1;
    --blush:       #f4e3dc;
    --ink:         #0d1040;
    --muted:       #7070a0;
    --border:      #ddd6d0;
    --white:       #ffffff;
    --open:        #1a6e42;
    --open-bg:     #e4f2ea;
    --closing:     #7a4800;
    --closing-bg:  #fef3de;
    --closed:      #5a5a80;
    --closed-bg:   #ececf3;
  }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--navy);
    padding: 1.25rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1160px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
  }
  .logo-wrap img {
    height: 44px;
    width: auto;
    display: block;
    filter: brightness(0) invert(1);
    opacity: 0.95;
  }
  .header-right {
    text-align: right;
  }
  .header-title {
    color: var(--cream);
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .header-sub {
    color: var(--blush);
    font-size: 0.68rem;
    font-family: 'Corbel', sans-serif;
    letter-spacing: 0.06em;
    opacity: 0.65;
    margin-top: 0.15rem;
  }

  /* FILTER BAR */
  .filters-bar {
    background: var(--blush);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 2rem;
    position: sticky;
    top: 74px;
    z-index: 90;
  }
  .filters-inner {
    max-width: 1160px;
    margin: 0 auto;
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 0.65rem;
    font-family: 'Corbel', sans-serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  select, input[type="text"] {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.35rem 0.7rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--ink);
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:focus, input[type="text"]:focus { border-color: var(--navy); }
  input[type="text"] { width: 190px; }
  .count {
    margin-left: auto;
    font-size: 0.68rem;
    font-family: 'Corbel', sans-serif;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* MAIN */
  main {
    max-width: 1160px;
    margin: 0 auto;
    padding: 1.75rem 2rem 5rem;
  }

  /* REGION GROUPS */
  .region-group { margin-bottom: 2.5rem; }
  .region-title {
    font-family: 'Corbel', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--navy);
    border-bottom: 1.5px solid var(--navy);
    padding-bottom: 0.35rem;
    margin-bottom: 0.85rem;
    opacity: 0.6;
  }

  /* CARDS */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-left: 3px solid var(--navy);
    border-radius: 0 5px 5px 0;
    padding: 0.85rem 1rem;
    margin-bottom: 0.5rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.4rem 1.25rem;
    align-items: start;
    transition: border-left-color 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    border-left-color: var(--blush);
    box-shadow: 0 2px 8px rgba(9,13,94,0.07);
  }
  .card.s-encerrando { border-left-color: #c07800; }
  .card.s-encerrado  { border-left-color: #ccc; opacity: 0.5; }

  .card-main { min-width: 0; }
  .card-title {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 0.3rem;
  }
  .card-title a {
    color: inherit;
    text-decoration: none;
  }
  .card-title a:hover { color: var(--navy); text-decoration: underline; }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem 0.8rem;
    font-size: 0.7rem;
    color: var(--muted);
    align-items: center;
  }
  .pill-area {
    background: var(--blush);
    color: var(--navy);
    border-radius: 3px;
    padding: 0.1rem 0.45rem;
    font-size: 0.62rem;
    font-family: 'Corbel', sans-serif;
    letter-spacing: 0.05em;
    font-weight: 700;
  }
  .card-obs {
    margin-top: 0.35rem;
    font-size: 0.68rem;
    color: var(--muted);
    line-height: 1.4;
  }

  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.4rem;
    min-width: 118px;
  }
  .badge {
    font-size: 0.6rem;
    font-family: 'Corbel', sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.18rem 0.5rem;
    border-radius: 3px;
    font-weight: 700;
  }
  .badge-aberto    { background: var(--open-bg);    color: var(--open); }
  .badge-encerrando { background: var(--closing-bg); color: var(--closing); }
  .badge-encerrado { background: var(--closed-bg);  color: var(--closed); }

  .deadline {
    font-size: 0.68rem;
    font-family: 'Corbel', sans-serif;
    color: var(--muted);
    text-align: right;
    line-height: 1.35;
  }
  .deadline strong { color: var(--ink); display: block; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 0.65rem;
    color: var(--muted);
    font-family: 'Corbel', sans-serif;
    letter-spacing: 0.06em;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 640px) {
    header, .filters-bar, main { padding-left: 1rem; padding-right: 1rem; }
    .filters-bar { top: 68px; }
    .card { grid-template-columns: 1fr; }
    .card-right { flex-direction: row; align-items: center; min-width: unset; }
    input[type="text"] { width: 100%; }
    .header-right .header-title { font-size: 0.85rem; }
  }
</style>
</head>

const grupos = ["Nacional","Internacional","Patrocínio Incentivado","Nordeste","Centro-Oeste","Sul","Sudeste"];

function render() {
  const st = document.getElementById('filter-status').value.toLowerCase();
  const gr = document.getElementById('filter-regiao').value;
  const bq = document.getElementById('filter-busca').value.toLowerCase();
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  let total = 0;

  grupos.forEach(grupo => {
    const items = editais.filter(e =>
      e.grupo === grupo &&
      (!gr || e.grupo === gr) &&
      (!st || e.status.toLowerCase() === st) &&
      (!bq || e.titulo.toLowerCase().includes(bq) || e.area.toLowerCase().includes(bq) || e.regiao.toLowerCase().includes(bq))
    );
    if (!items.length) return;
    total += items.length;

    const sec = document.createElement('div');
    sec.className = 'region-group';
    sec.innerHTML = `<div class="region-title">${grupo}</div>`;

    items.forEach(e => {
      const sc = e.status === 'Encerrando' ? 's-encerrando' : e.status === 'Encerrado' ? 's-encerrado' : '';
      const bc = e.status === 'Aberto' ? 'badge-aberto' : e.status === 'Encerrando' ? 'badge-encerrando' : 'badge-encerrado';
      const card = document.createElement('div');
      card.className = `card ${sc}`;
      card.innerHTML = `
        <div class="card-main">
          <div class="card-title"><a href="${e.link}" target="_blank" rel="noopener">${e.titulo}</a></div>
          <div class="card-meta">
            <span class="pill-area">${e.area}</span>
            <span>${e.regiao}</span>
            ${e.abertura && e.abertura !== '-' ? `<span>abertura ${e.abertura}</span>` : ''}
          </div>
          ${e.obs ? `<div class="card-obs">${e.obs}</div>` : ''}
        </div>
        <div class="card-right">
          <span class="badge ${bc}">${e.status}</span>
          <div class="deadline">prazo<strong>${e.encerramento}</strong></div>
        </div>`;
      sec.appendChild(card);
    });
    main.appendChild(sec);
  });

  document.getElementById('count-label').textContent = `${total} edital${total !== 1 ? 'is' : ''}`;
}

['filter-status','filter-regiao','filter-busca'].forEach(id =>
  document.getElementById(id).addEventListener(id === 'filter-busca' ? 'input' : 'change', render)
);
render();
</script>
